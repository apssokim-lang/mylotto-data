name: Lotto Official Data Auto Update

on:
  schedule:
    # Saturday 20:35-23:50 KST, every 15 minutes
    - cron: "35,50 11 * * 6"
    - cron: "5,20,35,50 12-14 * * 6"
    # Sunday 00:20-03:20 KST, hourly
    - cron: "20 15-18 * * 6"
    # Sunday daytime retries for delayed store publication
    - cron: "0 3,6,9 * * 0"
    # Daily 03:30 KST: backfill 2 past rounds, continuing toward round 1
    - cron: "30 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/update_lotto.yml"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: lotto-official-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      STORE_BACKFILL_BATCH: "2"
      STORE_BACKFILL_MIN_ROUND: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Collect official lotto data and stores
        run: python scripts/update_lotto.py

      - name: Validate JSON
        run: python scripts/validate_lotto.py

      - name: Commit changed data safely
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "mylotto-data-bot"
          git config user.email "actions@users.noreply.github.com"

          # Preserve the already collected and validated files. Do not call the
          # official site again during push-conflict handling; that previously
          # caused a second network timeout even though collection had succeeded.
          tmp_dir="$(mktemp -d)"
          cp data/lotto_results.json "$tmp_dir/lotto_results.json"
          if [ -f data/lotto_results_backup.json ]; then
            cp data/lotto_results_backup.json "$tmp_dir/lotto_results_backup.json"
          fi

          restore_generated_data() {
            cp "$tmp_dir/lotto_results.json" data/lotto_results.json
            if [ -f "$tmp_dir/lotto_results_backup.json" ]; then
              cp "$tmp_dir/lotto_results_backup.json" data/lotto_results_backup.json
            fi
          }

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            restore_generated_data
            python scripts/validate_lotto.py

            if git diff --quiet -- data/lotto_results.json data/lotto_results_backup.json; then
              echo "No data changes."
              exit 0
            fi

            git add data/lotto_results.json data/lotto_results_backup.json
            git commit -m "Auto update official lotto results and winning stores"

            if git push origin HEAD:main; then
              echo "Data commit completed."
              exit 0
            fi

            echo "Push race detected. Restoring the validated result on latest main (attempt ${attempt}/3)."
            sleep $((attempt * 3))
          done

          echo "Failed to push after 3 safe retries."
          exit 1
