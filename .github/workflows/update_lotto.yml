name: 로또 공식 데이터 완전 자동 업데이트

on:
  schedule:
    # GitHub cron은 UTC 기준입니다.
    # 한국시간 토요일 20:30~23:45: 15분마다 새 회차 확인
    - cron: "30,45 11 * * 6"
    - cron: "*/15 12-14 * * 6"
    # 공식 페이지 반영 지연에 대비해 일요일 00:15, 01:15에 추가 확인
    - cron: "15 15,16 * * 6"
    # 매일 한국시간 03:20: 기존 미완성 회차 소량 보완
    - cron: "20 18 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_lotto.py"
      - ".github/workflows/update_lotto.yml"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: lotto-official-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 동행복권 공식 데이터 수집 및 검증
        run: python scripts/update_lotto.py

      - name: JSON 최종 검증
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/lotto_results.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          results = data.get("results")
          assert isinstance(results, list) and results, "results가 비었습니다."
          service = data.get("service", {})
          assert service.get("collectorVersion") == "5.0-official-only-playwright"
          assert service.get("sourcePolicy") == "official-dhlottery-only"
          assert service.get("thirdPartySourceUsed") is False
          latest_round = int(data["latestRound"])
          latest = next(x for x in results if int(x["round"]) == latest_round)
          numbers = latest["winning"]["numbers"]
          bonus = latest["winning"]["bonus"]
          assert len(numbers) == 6 and len(set(numbers)) == 6
          assert all(1 <= int(v) <= 45 for v in numbers)
          assert 1 <= int(bonus) <= 45 and bonus not in numbers
          assert latest["prize"]["first"]["perGameAmount"]
          assert latest["prize"]["first"]["winnerCount"] is not None
          assert latest["prize"]["second"]["winnerCount"] is not None
          print("공식 데이터 JSON 검증 완료:", latest_round, "회")
          PY

      - name: 변경사항 자동 커밋
        run: |
          if git diff --quiet -- data/lotto_results.json data/lotto_results_backup.json; then
            echo "변경된 데이터가 없습니다."
            exit 0
          fi
          git config user.name "mylotto-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lotto_results.json
          if [ -f data/lotto_results_backup.json ]; then
            git add data/lotto_results_backup.json
          fi
          git commit -m "자동 갱신: 동행복권 공식 데이터"
          git push
