name: 로또 통합 데이터 자동 업데이트

on:
  workflow_dispatch:
  schedule:
    # 한국시간 매일 09:20, 21:20
    - cron: '20 0,12 * * *'
    # 토요일 추첨 뒤 한국시간 21:10, 21:40, 22:10
    - cron: '10,40 12 * * 6'
    - cron: '10 13 * * 6'

permissions:
  contents: write

concurrency:
  group: lotto-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 필요한 도구 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 회차 검증형 통합 갱신
        run: python scripts/update_lotto.py

      - name: JSON 구조 및 비정상 숫자 검사
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('data/lotto_results.json').read_text(encoding='utf-8'))
          assert data.get('service', {}).get('collectorVersion') == '2.7-round-verified-row-parser'
          for item in data.get('results', []):
              p = item.get('prize', {})
              f = p.get('first', {})
              s = p.get('second', {})
              a, w1, w2, total = f.get('perGameAmount'), f.get('winnerCount'), s.get('winnerCount'), p.get('totalSalesAmount')
              assert a is None or 100_000_000 <= int(a) <= 100_000_000_000, (item.get('round'), 'firstAmount', a)
              assert w1 is None or 1 <= int(w1) <= 1_000, (item.get('round'), 'firstWinners', w1)
              assert w2 is None or 1 <= int(w2) <= 100_000, (item.get('round'), 'secondWinners', w2)
              assert total is None or 1_000_000_000 <= int(total) <= 10_000_000_000_000, (item.get('round'), 'totalSales', total)
          print('JSON 및 숫자 검증 완료:', data.get('latestRound'), '회')
          PY

      - name: 바뀐 JSON이 있으면 자동 저장
        run: |
          if git diff --quiet -- data/lotto_results.json; then
            echo "변경된 데이터가 없습니다."
            exit 0
          fi
          git config user.name "mylotto-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lotto_results.json
          git commit -m "자동 갱신: 회차 검증 및 비정상 값 정리"
          git push
