name: 로또 공식 JSON 자동 업데이트

on:
  schedule:
    # 한국시간 토요일 20:35~23:50: 15분 간격 재시도
    - cron: "35,50 11 * * 6"
    - cron: "5,20,35,50 12-14 * * 6"
    # 한국시간 일요일 00:20, 01:20 최종 재확인
    - cron: "20 15,16 * * 6"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_lotto.py"
      - "scripts/validate_lotto.py"
      - "tests/**"
      - ".github/workflows/update_lotto.yml"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: lotto-official-json-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 단위 테스트
        run: python -m unittest discover -s tests -v

      - name: 공식 데이터 수집 및 저장
        run: python scripts/update_lotto.py

      - name: JSON 최종 검증
        run: python scripts/validate_lotto.py

      - name: 변경사항 자동 커밋
        run: |
          if git diff --quiet -- data/lotto_results.json data/lotto_results_backup.json; then
            echo "변경된 데이터가 없습니다."
            exit 0
          fi
          git config user.name "mylotto-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lotto_results.json data/lotto_results_backup.json
          git commit -m "자동 갱신: 동행복권 공식 JSON 데이터"
          git push
