name: Lotto Official Data Auto Update

on:
  schedule:
    # Saturday 20:35-23:50 KST, every 15 minutes
    - cron: "35,50 11 * * 6"
    - cron: "5,20,35,50 12-14 * * 6"
    # Sunday 00:20-03:20 KST, hourly
    - cron: "20 15-18 * * 6"
    # Sunday daytime retries for delayed store publication
    - cron: "0 3,6,9 * * 0"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/update_lotto.yml"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: lotto-official-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Collect official lotto data and stores
        run: python scripts/update_lotto.py

      - name: Validate JSON
        run: python scripts/validate_lotto.py

      - name: Upload store diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winning-store-diagnostics
          path: artifacts/store_debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit changed data
        run: |
          if git diff --quiet -- data/lotto_results.json data/lotto_results_backup.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "mylotto-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lotto_results.json data/lotto_results_backup.json
          git commit -m "Auto update official lotto results and winning stores"
          git push
