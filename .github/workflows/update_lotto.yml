name: 로또 통합 데이터 자동 업데이트

on:
  workflow_dispatch:
  schedule:
    # 한국시간 매일 03:20, 09:20, 15:20, 21:20
    - cron: '20 18,0,6,12 * * *'
    # 토요일 추첨 후 추가 확인: 한국시간 21:40, 22:10
    - cron: '40 12 * * 6'
    - cron: '10 13 * * 6'

permissions:
  contents: write

concurrency:
  group: lotto-result-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 필요한 도구 설치
        run: pip install -r requirements.txt

      - name: 최신회차 확인 · 최근 20회 우선 보완 · 과거 미완성 소량 보완
        env:
          BACKFILL_BATCH_SIZE: 5
          RECENT_CHECK_COUNT: 20
        run: python scripts/update_lotto.py

      - name: JSON v2.5 구조 검사
        run: |
          python - <<'PY'
          import json
          p=json.load(open('data/lotto_results.json',encoding='utf-8'))
          assert p['schemaVersion'] == 2
          assert p['results']
          service = p.get('service', {})
          assert service.get('backfillMode') == 'recent-priority-incremental'
          assert isinstance(service.get('backfillCursor'), int)
          assert 1 <= service['backfillCursor'] <= p['latestRound']
          assert service.get('backfillBatchSize') == 5
          assert service.get('recentPriorityCount') == 20
          assert service.get('backfillRange', {}).get('from') == 1
          assert service.get('backfillRange', {}).get('to') == p['latestRound']
          assert isinstance(service.get('completedRoundCount'), int)
          assert isinstance(service.get('incompleteRoundCount'), int)
          for r in p['results']:
              assert set(['round','date','winning','prize','stores']).issubset(r)
              assert set(['numbers','bonus']).issubset(r['winning'])
              assert set(['first','second','totalSalesAmount']).issubset(r['prize'])
              assert set(['perGameAmount','winnerCount']).issubset(r['prize']['first'])
              assert 'winnerCount' in r['prize']['second']
          print('JSON v2.5 구조 검사 통과')
          PY

      - name: 바뀐 JSON이 있으면 자동 저장
        shell: bash
        run: |
          if git diff --quiet -- data/lotto_results.json; then
            echo "저장할 변경사항이 없습니다."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto_results.json
          git commit -m "자동 업데이트: 최신회차·최근20회·과거 미완성 보완"
          git push
