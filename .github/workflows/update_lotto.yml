name: 로또 당첨번호 자동 업데이트

on:
  workflow_dispatch:
  schedule:
    # 한국시간 토요일 21:10, 21:40, 22:10 / 일요일 09:00
    - cron: '10,40 12 * * 6'
    - cron: '10 13 * * 6'
    - cron: '0 0 * * 0'

permissions:
  contents: write

concurrency:
  group: lotto-result-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 필요한 도구 설치
        run: pip install -r requirements.txt

      - name: 다음 회차 확인 및 JSON 갱신
        run: python scripts/update_lotto.py

      - name: 바뀐 JSON이 있으면 자동 저장
        shell: bash
        run: |
          if git diff --quiet -- data/lotto_results.json; then
            echo "새 회차가 아직 없어 저장할 변경사항이 없습니다."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto_results.json
          git commit -m "자동 업데이트: 로또 최신 당첨번호"
          git push
