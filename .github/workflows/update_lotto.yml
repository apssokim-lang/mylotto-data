name: 로또 공식 데이터 안전 자동 업데이트

on:
  schedule:
    # UTC 기준: 한국시간 토요일 20:30~23:45, 15분 간격
    - cron: "30,45 11 * * 6"
    - cron: "*/15 12-14 * * 6"
    # 일요일 00:15, 01:15 재확인
    - cron: "15 15,16 * * 6"
    # 매일 한국시간 03:20 과거 미완성 회차 보완
    - cron: "20 18 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_lotto.py"
      - "scripts/validate_lotto.py"
      - "tests/**"
      - ".github/workflows/update_lotto.yml"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: lotto-official-safe-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 데이터 엔진 단위 테스트
        run: python -m unittest discover -s tests -v

      - name: 기존 JSON 사전 백업
        run: cp data/lotto_results.json /tmp/lotto_results_before.json

      - name: 동행복권 공식 데이터 수집
        run: python scripts/update_lotto.py

      - name: JSON 최종 검증
        run: python scripts/validate_lotto.py

      - name: 기존 회차 보호 검증
        run: |
          python - <<'PY'
          import json
          before = json.load(open('/tmp/lotto_results_before.json', encoding='utf-8'))
          after = json.load(open('data/lotto_results.json', encoding='utf-8'))
          b = {int(x['round']): x for x in before['results']}
          a = {int(x['round']): x for x in after['results']}
          repaired = set(after.get('service', {}).get('repairedDuplicateRounds', []))
          for r, old in b.items():
              if r in repaired:
                  continue
              assert r in a, f'{r}회가 삭제되었습니다.'
              assert a[r].get('winning') == old.get('winning'), f'보호된 {r}회 번호가 변경되었습니다.'
          print('기존 회차 번호 보호 검증 통과')
          PY

      - name: 변경사항 자동 커밋
        run: |
          if git diff --quiet -- data/lotto_results.json data/lotto_results_backup.json; then
            echo "변경된 데이터가 없습니다."
            exit 0
          fi
          git config user.name "mylotto-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lotto_results.json
          [ -f data/lotto_results_backup.json ] && git add data/lotto_results_backup.json
          git commit -m "자동 갱신: 공식 로또 데이터 안전 업데이트"
          git push
