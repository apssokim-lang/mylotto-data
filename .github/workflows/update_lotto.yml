name: 로또 통합 데이터 완전 자동 업데이트

on:
  # 한국시간 토요일 20:00~23:45, 15분마다 새 회차를 자동 확인합니다.
  # GitHub Actions cron은 UTC 기준입니다.
  schedule:
    - cron: "*/15 11-14 * * 6"

    # 과거 회차 당첨금·판매점 보완을 위해 매일 한국시간 03:20에 실행합니다.
    - cron: "20 18 * * *"

  # 필요할 때만 수동 실행할 수 있도록 남겨둡니다.
  workflow_dispatch:

  # 수집기나 워크플로를 수정하면 즉시 시험 실행합니다.
  push:
    branches: [main]
    paths:
      - "scripts/update_lotto.py"
      - ".github/workflows/update_lotto.yml"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: lotto-data-auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필수 패키지 설치
        run: pip install -r requirements.txt

      - name: 로또 데이터 자동 수집 및 검증
        run: python scripts/update_lotto.py

      - name: JSON 최종 검증
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/lotto_results.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          results = data.get("results", [])
          rounds = [int(item["round"]) for item in results]

          if not results:
              raise SystemExit("results가 비어 있습니다.")
          if len(rounds) != len(set(rounds)):
              raise SystemExit("중복 회차가 있습니다.")
          if max(rounds) != int(data.get("latestRound", 0)):
              raise SystemExit("latestRound가 실제 최신 회차와 다릅니다.")

          latest = max(results, key=lambda item: int(item["round"]))
          winning = latest.get("winning", {})
          numbers = winning.get("numbers", [])
          bonus = winning.get("bonus")

          if len(numbers) != 6 or len(set(numbers)) != 6:
              raise SystemExit("최신 회차 당첨번호가 올바르지 않습니다.")
          if bonus in numbers:
              raise SystemExit("보너스 번호가 당첨번호와 중복됩니다.")

          print(f"검증 완료: 최신 {data['latestRound']}회 / 총 {len(results)}회")
          PY

      - name: 변경사항 자동 커밋
        shell: bash
        run: |
          if git diff --quiet -- data/lotto_results.json data/lotto_results_backup.json; then
            echo "커밋할 데이터 변경사항이 없습니다."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto_results.json

          if [ -f data/lotto_results_backup.json ]; then
            git add data/lotto_results_backup.json
          fi

          latest_round=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/lotto_results.json").read_text(encoding="utf-8"))
          print(data.get("latestRound", "unknown"))
          PY
          )

          git commit -m "자동 업데이트: 로또 ${latest_round}회 및 과거 데이터 보완"
          git push
