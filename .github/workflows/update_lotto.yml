name: 로또 통합 데이터 자동 업데이트

on:
  workflow_dispatch:
  schedule:
    # 전체 과거회차 보완: 매일 한국시간 03:20, 09:20, 15:20, 21:20
    - cron: '20 18,0,6,12 * * *'
    # 토요일 추첨 직후 추가 확인(한국시간 21:40, 22:10)
    - cron: '40 12 * * 6'
    - cron: '10 13 * * 6'

permissions:
  contents: write

concurrency:
  group: lotto-result-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 필요한 도구 설치
        run: pip install -r requirements.txt

      - name: 당첨번호·당첨금·판매점 통합 갱신
        env:
          BACKFILL_BATCH_SIZE: 50
        run: python scripts/update_lotto.py

      - name: JSON v2 구조 검사
        run: |
          python - <<'PY'
          import json
          p=json.load(open('data/lotto_results.json',encoding='utf-8'))
          assert p['schemaVersion'] == 2
          assert p['results']
          service = p.get('service', {})
          assert service.get('backfillMode') == 'all-rounds-batched', 'service.backfillMode 누락 또는 값 오류'
          cursor = service.get('backfillCursor')
          assert isinstance(cursor, int), 'service.backfillCursor 누락 또는 형식 오류'
          assert 1 <= cursor <= p['latestRound'], 'service.backfillCursor 범위 오류'
          assert service.get('backfillBatchSize') == 50, 'service.backfillBatchSize 누락 또는 값 오류'
          assert service.get('backfillRange', {}).get('from') == 1, 'service.backfillRange.from 오류'
          assert service.get('backfillRange', {}).get('to') == p['latestRound'], 'service.backfillRange.to 오류'
          for r in p['results']:
              assert set(['round','date','winning','prize','stores']).issubset(r)
              assert set(['numbers','bonus']).issubset(r['winning'])
              assert set(['first','second','totalSalesAmount']).issubset(r['prize'])
              assert set(['perGameAmount','winnerCount']).issubset(r['prize']['first'])
              assert 'winnerCount' in r['prize']['second']
          print('JSON v2 구조 검사 통과')
          PY

      - name: 바뀐 JSON이 있으면 자동 저장
        shell: bash
        run: |
          if git diff --quiet -- data/lotto_results.json; then
            echo "저장할 변경사항이 없습니다."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto_results.json
          git commit -m "자동 업데이트: 로또 통합 데이터 v2"
          git push
