      - name: JSON 및 최근 회차 회귀 검사
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/lotto_results.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          results = data.get("results", [])
          if not isinstance(results, list):
              raise SystemExit("ERROR: results가 배열 형식이 아닙니다.")

          by_round = {}

          for item in results:
              if not isinstance(item, dict):
                  continue

              try:
                  round_no = int(item.get("round"))
              except (TypeError, ValueError):
                  continue

              by_round[round_no] = item

          if not by_round:
              raise SystemExit("ERROR: 유효한 회차 데이터가 없습니다.")

          required_rounds = [1228, 1229, 1230, 1231]

          for round_no in required_rounds:
              item = by_round.get(round_no)

              if item is None:
                  print(f"WARNING: {round_no}회가 JSON에 없어 검사를 건너뜁니다.")
                  continue

              prize = item.get("prize") or {}
              first = prize.get("first") or {}
              second = prize.get("second") or {}

              first_amount = first.get("perGameAmount")
              first_count = first.get("winnerCount")
              second_count = second.get("winnerCount")
              total_sales = prize.get("totalSalesAmount")

              numeric_values = {
                  "1등 당첨금": first_amount,
                  "1등 게임 수": first_count,
                  "2등 게임 수": second_count,
                  "총 판매금액": total_sales,
              }

              for label, value in numeric_values.items():
                  if value is not None and (
                      isinstance(value, bool) or not isinstance(value, int)
                  ):
                      raise SystemExit(
                          f"ERROR: {round_no}회 {label} 값이 숫자가 아닙니다: {value}"
                      )

              if first_amount is not None and not 100_000_000 <= first_amount <= 10_000_000_000:
                  raise SystemExit(
                      f"ERROR: {round_no}회 1등 당첨금이 비정상입니다: {first_amount}"
                  )

              if first_count is not None and not 1 <= first_count <= 100:
                  raise SystemExit(
                      f"ERROR: {round_no}회 1등 게임 수가 비정상입니다: {first_count}"
                  )

              if second_count is not None and not 1 <= second_count <= 1000:
                  raise SystemExit(
                      f"ERROR: {round_no}회 2등 게임 수가 비정상입니다: {second_count}"
                  )

              if total_sales is not None and not 1_000_000_000 <= total_sales <= 1_000_000_000_000:
                  raise SystemExit(
                      f"ERROR: {round_no}회 총 판매금액이 비정상입니다: {total_sales}"
                  )

              print(f"OK: {round_no}회 데이터 구조 및 값 검사 완료")

          service = data.get("service")
          if not isinstance(service, dict):
              data["service"] = {}

          print(f"OK: 총 {len(by_round)}개 회차 JSON 검사 완료")
          PY
