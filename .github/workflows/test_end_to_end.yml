name: 자동갱신 연결 최종 테스트

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-test-json:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 테스트용 1233회 JSON 생성
        run: python scripts/create_test_round.py

      - name: 테스트 JSON 자동 저장
        run: |
          git config user.name "mylotto-test-bot"
          git config user.email "mylotto-test-bot@users.noreply.github.com"
          git add data/lotto_results_test.json
          if git diff --cached --quiet; then
            echo "변경 사항이 없습니다."
          else
            git commit -m "test: 자동갱신 연결 검증용 1233회 생성"
            git push
          fi
